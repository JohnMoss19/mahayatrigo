<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunGradient" x1="50" y1="20" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff8c00" />
      <stop offset="100%" stop-color="#ffd700" />
    </linearGradient>
  </defs>

  {/* Sun - Large and Vibrant */}
  <circle cx="50" cy="55" r="35" fill="url(#sunGradient)" />

  {/* Sun Rays - Golden and Bold (Moved after sun for visibility) */}
  <g stroke="#d4af37" stroke-width="3.5" stroke-linecap="round">
    <line x1="50" y1="25" x2="50" y2="5" />
    <line x1="70" y1="30" x2="85" y2="15" />
    <line x1="85" y1="50" x2="98" y2="50" />
    <line x1="75" y1="75" x2="90" y2="85" />
    <line x1="30" y1="30" x2="15" y2="15" />
    <line x1="15" y1="50" x2="2" y2="50" />
    <line x1="25" y1="75" x2="10" y2="85" />
  </g>
  
  {/* Trishul - Golden and Bold (Matches brand logo colors) */}
  <path 
    d="M42 25C42 16 58 16 58 25M50 12V32M45 18V26M55 18V26" 
    stroke="#d4af37" 
    stroke-width="4" 
    stroke-linecap="round" 
  />
  
  {/* Stylized M - White and Bold (As requested) */}
  <path 
    d="M10 90V40L50 78L90 40V90" 
    stroke="white" 
    stroke-width="14" 
    stroke-linecap="round" 
