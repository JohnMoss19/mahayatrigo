<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunGradient" x1="50" y1="20" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff8c00" />
      <stop offset="100%" stop-color="#ffd700" />
    </linearGradient>
  </defs>

  {/* Sun Rays - Thicker and White for clarity */}
  <g stroke="white" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="30" x2="50" y2="10" />
    <line x1="70" y1="35" x2="85" y2="20" />
    <line x1="85" y1="55" x2="95" y2="55" />
    <line x1="30" y1="35" x2="15" y2="20" />
    <line x1="15" y1="55" x2="5" y2="55" />
  </g>
  
  {/* Sun - Larger to fill space */}
  <circle cx="50" cy="55" r="32" fill="url(#sunGradient)" />
  
  {/* Trishul - Bold and White */}
  <path 
    d="M42 25C42 18 58 18 58 25M50 15V35M45 20V28M55 20V28" 
    stroke="white" 
    stroke-width="3.5" 
    stroke-linecap="round" 
  />
  
  {/* Stylized M - White, Bold, and Filling the width */}
  <path 
    d="M12 90V38L50 75L88 38V90" 
    stroke="white" 
    stroke-width="14" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
  
  {/* Airplane - White and larger */}
  <g transform="translate(85, 45) rotate(-25)">
    <path 
      d="M0 0L15 -4L13 -10L15 -4L22 -4L15 0L15 6L10 0L0 0Z" 
      fill="white" 
    />
  </g>
</svg>
